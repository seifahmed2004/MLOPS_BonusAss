name : pipeline
on:
  push:
    branches:
      -main
  pull_request:
    branches:
      -main
jobs:
  testANDvalidate:
    runs_on:
      -ubunto-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Run complete"
  buildANDdeploy:
    runs_on:
      -ubunto-latest
    needs : testANDvalidate
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - run : echo "Build and deploy complete"