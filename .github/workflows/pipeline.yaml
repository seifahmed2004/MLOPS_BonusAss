name: Gatekeeper CI/CD Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  linter:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8

      - name: Run linter
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  train:
    name: Expensive Train Job
    runs-on: ubuntu-latest
    needs: linter
    if: >-
      ${{
        needs.linter.result == 'success' &&
        github.ref == 'refs/heads/main' &&
        contains(github.event.head_commit.message, '[run-train]')
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run training
        run: |
          mkdir -p logs
          echo "Starting expensive training job..."
          python train.py 2>&1 | tee logs/train_output.log

      - name: Create error_logs.txt on failure
        if: failure()
        run: |
          {
            echo "Training job failed"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Commit message: ${{ github.event.head_commit.message }}"
            echo "----------------------------------------"
            echo "Training output:"
            if [ -f logs/train_output.log ]; then
              cat logs/train_output.log
            else
              echo "No training log file was generated."
            fi
          } > error_logs.txt

      - name: Upload error_logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."