name: safe-health-pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow

      - name: Dry run
        run: python train.py --epochs 1 

      - name: Fetch the best model from MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python get_best_model.py

      - name: Upload best model URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: best-model-uri
          path: best_model_uri.txt

      - name: Upload validation logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: debug.log

      - name: Cleanup validation resources
        if: always()
        run: echo "Cleaning up validation resources..."

  deploy:
    needs: validate
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download best model URI artifact
        uses: actions/download-artifact@v4
        with:
          name: best-model-uri

      - name: Show best model URI
        run: cat best_model_uri.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/safe-health-pipeline:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/safe-health-pipeline:latest

      - name: Final cleanup
        if: always()
        run: echo "Cleaning up deployment resources..."